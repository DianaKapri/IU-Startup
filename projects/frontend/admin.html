<html lang="ru">
<head>

<meta charset="UTF-8"/>
<link rel="icon" href="/assets/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/assets/favicon-mob.png"><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Админ-панель — ШколаПлан</title>
<link rel="stylesheet" href="/css/styles.css"/>
<link rel="stylesheet" href="/css/account.css"/>
<style>
.admin-page {
  background: #0a0a0a;
  color: #f5f5f7;
  min-height: 100vh;
  padding: 88px 24px 40px;
}

.admin-container {
  max-width: 1200px;
  margin: 0 auto;
}

.admin-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}

.admin-header__title {
  font-size: 2rem;
  font-weight: 700;
  color: #f5f5f7;
  margin-bottom: 8px;
}

.admin-header__sub {
  color: #86868b;
  font-size: 1rem;
}

.admin-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.admin-stat {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}

.admin-stat__value {
  font-size: 2rem;
  font-weight: 700;
  color: #f5f5f7;
  margin-bottom: 4px;
}

.admin-stat__label {
  font-size: 0.88rem;
  color: #86868b;
}

.admin-table {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px;
  overflow: hidden;
}

.admin-table__header {
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.admin-table__title {
  font-size: 1.2rem;
  font-weight: 600;
  color: #f5f5f7;
}

.admin-table__refresh {
  background: var(--blue);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.88rem;
  font-weight: 500;
}

.admin-table__refresh:hover {
  background: var(--blue-hover);
}

.admin-table__content {
  overflow-x: auto;
}

.admin-table table {
  width: 100%;
  border-collapse: collapse;
}

.admin-table th {
  background: rgba(255,255,255,.06);
  padding: 12px 16px;
  text-align: left;
  font-weight: 600;
  font-size: 0.88rem;
  color: #f5f5f7;
  border-bottom: 1px solid rgba(255,255,255,.08);
}

.admin-table td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  font-size: 0.88rem;
}

.admin-table tr:hover {
  background: rgba(255,255,255,.02);
}

.status-badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 0.76rem;
  font-weight: 500;
}

.status-badge--pending {
  background: rgba(255, 159, 10, 0.2);
  color: #ff9f0a;
}

.status-badge--processed {
  background: rgba(48, 209, 88, 0.2);
  color: #30d158;
}

.status-badge--rejected {
  background: rgba(255, 69, 58, 0.2);
  color: #ff453a;
}

.admin-actions {
  display: flex;
  gap: 8px;
}

.admin-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  color: #f5f5f7;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.76rem;
  transition: background 0.15s;
}

.admin-btn:hover {
  background: rgba(255,255,255,.12);
}

.admin-btn--approve {
  background: rgba(48, 209, 88, 0.2);
  border-color: rgba(48, 209, 88, 0.3);
  color: #30d158;
}

.admin-btn--approve:hover {
  background: rgba(48, 209, 88, 0.3);
}

.admin-btn--reject {
  background: rgba(255, 69, 58, 0.2);
  border-color: rgba(255, 69, 58, 0.3);
  color: #ff453a;
}

.admin-btn--reject:hover {
  background: rgba(255, 69, 58, 0.3);
}

.loading {
  text-align: center;
  padding: 40px;
  color: #86868b;
}

.error {
  text-align: center;
  padding: 40px;
  color: #ff453a;
}

.empty {
  text-align: center;
  padding: 40px;
  color: #86868b;
}
</style>
</head>
<body class="admin-page">

<nav class="nav nav--dark" id="nav"><div class="nav__inner">
  <a href="/" class="nav__logo"><svg class="nav__logo-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="1" y="1" width="8" height="8" rx="1.5" fill="currentColor" opacity=".9"/><rect x="11" y="1" width="8" height="8" rx="1.5" fill="currentColor" opacity=".5"/><rect x="1" y="11" width="8" height="8" rx="1.5" fill="currentColor" opacity=".5"/><rect x="11" y="11" width="8" height="8" rx="1.5" fill="currentColor" opacity=".3"/></svg> ШколаПлан</a>
  <div class="nav__right">
    <span class="nav__link" id="adminEmail">admin@example.com</span>
    <button class="nav__pill nav__pill--ghost" id="logoutBtn">Выйти</button>
  </div>
</div></nav>

<div class="admin-container">
  <header class="admin-header">
    <h1 class="admin-header__title">Админ-панель</h1>
    <p class="admin-header__sub">Управление запросами на подписку</p>
  </header>

  <div class="admin-stats" id="adminStats">
    <div class="admin-stat">
      <div class="admin-stat__value" id="totalRequests">0</div>
      <div class="admin-stat__label">Всего запросов</div>
    </div>
    <div class="admin-stat">
      <div class="admin-stat__value" id="pendingRequests">0</div>
      <div class="admin-stat__label">В обработке</div>
    </div>
    <div class="admin-stat">
      <div class="admin-stat__value" id="processedRequests">0</div>
      <div class="admin-stat__label">Обработано</div>
    </div>
    <div class="admin-stat">
      <div class="admin-stat__value" id="revenue">0 ₽</div>
      <div class="admin-stat__label">Доход</div>
    </div>
  </div>

  <div class="admin-table">
    <div class="admin-table__header">
      <h2 class="admin-table__title">Запросы на подписку</h2>
      <button class="admin-table__refresh" id="refreshBtn">Обновить</button>
    </div>
    <div class="admin-table__content">
      <div id="requestsContainer">
        <div class="loading">Загрузка...</div>
      </div>
    </div>
  </div>
</div>

<script>
// Авторизация администратора через токен, переданный в заголовке X-Admin-Token.
// Токен хранится в sessionStorage['adminToken'] и выставляется на admin-login.html.
// sessionStorage не сохраняется между сессиями и не доступен другим вкладкам.

function getAdminToken() {
  return sessionStorage.getItem('adminToken');
}

function redirectToLogin() {
  sessionStorage.removeItem('adminToken');
  // Также чистим устаревшие ключи из localStorage на случай старого браузера.
  localStorage.removeItem('adminToken');
  window.location.href = '/admin-login.html';
}

function adminFetch(url, options) {
  const opts = options ? Object.assign({}, options) : {};
  const headers = Object.assign({}, opts.headers || {});
  const token = getAdminToken();
  if (token) {
    headers['X-Admin-Token'] = token;
  }
  opts.headers = headers;
  return fetch(url, opts).then(function (response) {
    if (response.status === 401) {
      redirectToLogin();
      // Возвращаем rejected promise, чтобы вызывающий код не обрабатывал пустой ответ.
      throw new Error('UNAUTHORIZED');
    }
    return response;
  });
}

// Проверка авторизации админа
function checkAdminAuth() {
  if (!getAdminToken()) {
    redirectToLogin();
    return;
  }

  const nameEl = document.getElementById('adminEmail');
  if (nameEl) nameEl.textContent = 'Администратор';
  loadRequests();
}

// Загрузка запросов
async function loadRequests() {
  try {
    const response = await adminFetch('/api/subscription-requests');
    const result = await response.json();

    if (result.success) {
      displayRequests(result.data);
      updateStats(result.data);
    } else {
      console.error('Ошибка загрузки запросов:', result.error);
      showError('Ошибка загрузки данных: ' + (result.error?.message || 'Неизвестная ошибка'));
    }
  } catch (err) {
    if (err && err.message === 'UNAUTHORIZED') return; // редирект уже произошёл
    console.error('Ошибка:', err);
    showError('Произошла ошибка при загрузке данных');
  }
}

// Отображение запросов
function displayRequests(requests) {
  const container = document.getElementById('requestsContainer');
  
  if (!requests || requests.length === 0) {
    container.innerHTML = '<div class="empty">Запросов пока нет</div>';
    return;
  }
  
  const table = `
    <table>
      <thead>
        <tr>
          <th>Дата</th>
          <th>Организация</th>
          <th>ИНН</th>
          <th>Email</th>
          <th>Тариф</th>
          <th>Цена</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody>
        ${requests.map(req => `
          <tr>
            <td>${new Date(req.created_at).toLocaleDateString('ru-RU')}</td>
            <td>${req.organization_name || '-'}</td>
            <td>${req.inn || '-'}</td>
            <td>${req.email}</td>
            <td>${req.plan === 'school' ? 'Школа' : req.plan}</td>
            <td>${req.price} ₽</td>
            <td><span class="status-badge status-badge--${req.status}">${getStatusText(req.status)}</span></td>
            <td>
              <div class="admin-actions">
                ${req.status === 'pending' ? `
                  <button class="admin-btn admin-btn--approve" onclick="updateRequestStatus('${req.id}', 'processed')">Одобрить</button>
                  <button class="admin-btn admin-btn--reject" onclick="updateRequestStatus('${req.id}', 'rejected')">Отклонить</button>
                ` : '-'}
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  
  container.innerHTML = table;
}

// Обновление статистики
function updateStats(requests) {
  const total = requests.length;
  const pending = requests.filter(r => r.status === 'pending').length;
  const processed = requests.filter(r => r.status === 'processed').length;
  const revenue = requests
    .filter(r => r.status === 'processed')
    .reduce((sum, r) => sum + (r.price || 0), 0);
  
  document.getElementById('totalRequests').textContent = total;
  document.getElementById('pendingRequests').textContent = pending;
  document.getElementById('processedRequests').textContent = processed;
  document.getElementById('revenue').textContent = revenue.toLocaleString('ru-RU') + ' ₽';
}

// Обновление статуса запроса
async function updateRequestStatus(requestId, newStatus) {
  try {
    const response = await adminFetch(`/api/subscription-requests/${requestId}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ status: newStatus })
    });

    const result = await response.json();

    if (result.success) {
      // Перезагружаем данные
      loadRequests();
      alert(`Статус успешно обновлен на "${getStatusText(newStatus)}"`);
    } else {
      console.error('Ошибка обновления статуса:', result.error);
      alert('Ошибка при обновлении статуса: ' + (result.error?.message || 'Неизвестная ошибка'));
    }
  } catch (err) {
    if (err && err.message === 'UNAUTHORIZED') return;
    console.error('Ошибка:', err);
    alert('Произошла ошибка при обновлении статуса');
  }
}

// Получение текста статуса
function getStatusText(status) {
  switch (status) {
    case 'pending': return 'В обработке';
    case 'processed': return 'Обработано';
    case 'rejected': return 'Отклонено';
    default: return status;
  }
}

// Показ ошибки
function showError(message) {
  document.getElementById('requestsContainer').innerHTML = `<div class="error">${message}</div>`;
}

// Обработчики событий
document.getElementById('refreshBtn').addEventListener('click', loadRequests);

document.getElementById('logoutBtn').addEventListener('click', function() {
  sessionStorage.removeItem('adminToken');
  // Чистим устаревшие ключи из localStorage.
  localStorage.removeItem('adminToken');
  localStorage.removeItem('adminEmail');
  localStorage.removeItem('adminPassword');
  window.location.href = '/admin-login.html';
});

// Инициализация
document.addEventListener('DOMContentLoaded', function() {
  checkAdminAuth();
});
</script>
</body>
</html>
