<meta charset="UTF-8"/>

<title>Сгенерированное расписание — ШколаПлан</title>
<link rel="stylesheet" href="./css/styles.css"/>
<link rel="stylesheet" href="./css/demo.css"/>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
body{background:#000;color:#f5f5f7;min-height:100vh;}
.sch-page{max-width:1100px;margin:0 auto;padding:100px 24px 60px;}
.sch-header{margin-bottom:32px;}
.sch-eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#0071e3;margin-bottom:8px;}
.sch-title{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;letter-spacing:-.04em;color:#f5f5f7;margin-bottom:4px;}
.sch-sub{font-size:.9rem;color:#86868b;}
.sch-back{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:#86868b;text-decoration:none;margin-bottom:28px;transition:color .15s;}
.sch-back:hover{color:#f5f5f7;}
.sch-back svg{flex-shrink:0;}
.sch-panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px;margin-bottom:20px;}
.sch-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sch-cta-bar{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;}
.sch-btn{padding:10px 22px;border-radius:8px;font-size:.86rem;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:all .15s;font-family:var(--font);border:none;}
.sch-btn--primary{background:#0071e3;color:#fff;}
.sch-btn--primary:hover{background:#0077ed;}
.sch-btn--green{background:#22c55e;color:#fff;}
.sch-btn--green:hover{background:#16a34a;}
.sch-btn--ghost{background:transparent;color:#f5f5f7;border:1px solid rgba(255,255,255,.2);}
.sch-btn--ghost:hover{border-color:rgba(255,255,255,.4);}
.sch-stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.sch-stat{flex:1;min-width:100px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;}
.sch-stat__val{font-size:1.4rem;font-weight:700;color:#f5f5f7;line-height:1;}
.sch-stat__lbl{font-size:.7rem;color:#555;margin-top:4px;}
.sch-shift-tabs{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,.04);border-radius:10px;width:fit-content;}
.sch-shift-tab{background:transparent;border:none;color:#86868b;font-family:var(--font);font-size:.82rem;font-weight:500;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .15s;}
.sch-shift-tab:hover{color:#f5f5f7;}
.sch-shift-tab--active{background:rgba(0,113,227,.18);color:#4da3ff;}
/* Emergency substitution modal */
.sub-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;}
.sub-overlay--open{display:flex;}
.sub-modal{background:#1c1c1e;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:28px;max-width:560px;width:92%;max-height:85vh;overflow-y:auto;}
.sub-modal__title{font-size:1.2rem;font-weight:700;margin-bottom:16px;color:#f5f5f7;}
.sub-modal__row{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.sub-modal__label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:#86868b;font-weight:600;}
.sub-modal__sel{background:#2c2c2e;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;color:#f5f5f7;font-family:var(--font);font-size:.9rem;}
.sub-modal__sel:focus{border-color:#0071e3;outline:none;}
.sub-modal__actions{display:flex;gap:10px;margin-top:12px;}
.sub-modal__result{margin-top:18px;padding:14px;background:rgba(255,255,255,.04);border-radius:10px;font-size:.85rem;line-height:1.6;max-height:300px;overflow-y:auto;}
.sub-item{padding:10px 12px;margin-bottom:8px;background:rgba(255,255,255,.04);border-radius:8px;border-left:3px solid #30d158;}
.sub-item--none{border-left-color:#ff9f0a;}
.sub-item__head{font-weight:600;color:#f5f5f7;}
.sub-item__msg{font-size:.82rem;color:#86868b;margin-top:2px;}
</style>
</head>
<body>

<nav class="nav" id="nav"><div class="nav__inner">
  <a href="./index.html" class="nav__logo"><svg class="nav__logo-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="1" y="1" width="8" height="8" rx="1.5" fill="currentColor" opacity=".9"/><rect x="11" y="1" width="8" height="8" rx="1.5" fill="currentColor" opacity=".5"/><rect x="1" y="11" width="8" height="8" rx="1.5" fill="currentColor" opacity=".5"/><rect x="11" y="11" width="8" height="8" rx="1.5" fill="currentColor" opacity=".3"/></svg> ШколаПлан</a>
</div></nav>

<div class="sch-page">
  <a href="./index.html#wizard-section" class="sch-back" id="schBack"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Назад к мастеру</a>

  <div class="sch-header">
    <p class="sch-eyebrow">Результат генерации</p>
    <h1 class="sch-title" id="schTitle">Расписание</h1>
    <p class="sch-sub" id="schSub">Сгенерировано алгоритмом ШколаПлан с учётом норм СанПиН</p>
  </div>

  <div class="sch-stat-row" id="schStats"></div>

  <div class="sch-shift-tabs" id="schShiftTabs" style="display:none;margin-bottom:16px;">
    <button class="sch-shift-tab sch-shift-tab--active" data-shift="all">Все классы</button>
    <button class="sch-shift-tab" data-shift="1">1 смена</button>
    <button class="sch-shift-tab" data-shift="2">2 смена</button>
  </div>

  <div class="sch-panel">
    <div id="schGrid"><div class="sch-tbl-wrap"><table class="acc-grid-tbl" id="schGridTbl"></table></div></div>
  </div>

  <div class="sch-cta-bar">
    <button class="sch-btn sch-btn--green" onclick="downloadExcel()">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v9m0 0L4 7.5m3.5 3.5L11 7.5M2 12.5h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Скачать .xlsx
    </button>
    <button class="sch-btn sch-btn--primary" id="schSubBtn" style="display:none">🚨 Учитель заболел</button>
    <button class="sch-btn sch-btn--ghost" onclick="window.print()">Распечатать</button>
    <a href="./login.html?tab=register" class="sch-btn sch-btn--ghost">Сохранить и войти</a>
  </div>
</div>

<!-- Эпик 3.3: модалка экстренных замен -->
<div class="sub-overlay" id="subOverlay">
  <div class="sub-modal">
    <h2 class="sub-modal__title">🚨 Экстренная замена учителя</h2>
    <div class="sub-modal__row">
      <label class="sub-modal__label">Отсутствующий учитель</label>
      <select class="sub-modal__sel" id="subTeacher"></select>
    </div>
    <div class="sub-modal__row">
      <label class="sub-modal__label">День недели</label>
      <select class="sub-modal__sel" id="subDay">
        <option value="0">Понедельник</option>
        <option value="1">Вторник</option>
        <option value="2">Среда</option>
        <option value="3">Четверг</option>
        <option value="4">Пятница</option>
      </select>
    </div>
    <div class="sub-modal__actions">
      <button class="sch-btn sch-btn--primary" id="subRunBtn">Подобрать замены</button>
      <button class="sch-btn sch-btn--ghost" id="subCloseBtn">Отмена</button>
    </div>
    <div class="sub-modal__result" id="subResult" style="display:none"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="./js/engine.js"></script>
<script>
var _schData=null;

(function(){
  var src = localStorage.getItem('shkolaplan_wizard_source');
  var backLink = document.getElementById('schBack');
  if (backLink && src === 'account') backLink.href = './account.html';

  var openId = localStorage.getItem('shkolaplan_wizard_open_item');
  if (openId && !sessionStorage.getItem('wizSchedule')) {
    try {
      var runs = JSON.parse(localStorage.getItem('shkolaplan_wizard_runs') || '[]');
      var picked = runs.find(function (r) { return r.id === openId; });
      if (picked && picked.payload) sessionStorage.setItem('wizSchedule', JSON.stringify(picked.payload));
    } catch (_) {}
  }
  localStorage.removeItem('shkolaplan_wizard_open_item');

  var raw;
  try{raw=sessionStorage.getItem('wizSchedule');}catch(e){}
  if(!raw){
    document.getElementById('schTitle').textContent='Нет данных';
    document.getElementById('schSub').textContent='Вернитесь и заполните мастер составления расписания';
    return;
  }
  var data=JSON.parse(raw);
  _schData=data;
  var sch=data.sch,cg=data.cg,school=data.school||'';

  if(school){
    document.getElementById('schTitle').textContent='Расписание — '+school;
    document.title='Расписание | '+school+' | ШколаПлан';
  }

  var classCount=Object.keys(sch).length;
  var totalLessons=0;
  Object.keys(sch).forEach(function(c){sch[c].forEach(function(d){d.forEach(function(l){if(l)totalLessons++;});});});
  var audit=doAudit(sch,cg);
  var violations=audit.vi?audit.vi.length:0;

  var statsEl=document.getElementById('schStats');
  statsEl.innerHTML=[
    {v:classCount,l:'Классов'},
    {v:totalLessons,l:'Уроков / неделю'},
    {v:audit.score!==undefined?audit.score:'—',l:'Оценка качества'},
    {v:violations,l:'Нарушений СанПиН'}
  ].map(function(s){
    return '<div class="sch-stat"><div class="sch-stat__val">'+s.v+'</div><div class="sch-stat__lbl">'+s.l+'</div></div>';
  }).join('');

  // Эпик 3.1: если в payload есть разделение на смены — показываем табы-фильтр
  var shifts = data.shifts || {};
  var shiftSet = {};
  Object.keys(shifts).forEach(function(c){ shiftSet[shifts[c]] = true; });
  var hasTwoShifts = shiftSet[1] && shiftSet[2];
  if (hasTwoShifts) {
    document.getElementById('schShiftTabs').style.display = 'flex';
  }

  function filterByShift(target) {
    if (target === 'all') return sch;
    var filt = {};
    Object.keys(sch).forEach(function(cls){
      if ((shifts[cls] || 1) === target) filt[cls] = sch[cls];
    });
    return filt;
  }

  function render(target) {
    var filt = filterByShift(target);
    var tbl = document.getElementById('schGridTbl');
    renderGrid(filt, cg, doAudit(filt, cg), tbl);
  }
  render('all');

  Array.prototype.forEach.call(document.querySelectorAll('.sch-shift-tab'), function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.sch-shift-tab').forEach(function(b){ b.classList.remove('sch-shift-tab--active'); });
      btn.classList.add('sch-shift-tab--active');
      var sh = btn.getAttribute('data-shift');
      render(sh === 'all' ? 'all' : Number(sh));
    });
  });
})();

function downloadExcel(){
  if(!_schData){return;}
  var sch=_schData.sch,school=_schData.school||'Расписание';
  var days=['Понедельник','Вторник','Среда','Четверг','Пятница'];
  var wb=XLSX.utils.book_new();

  /* One sheet per class */
  var classes=Object.keys(sch).sort(function(a,b){
    var na=parseInt(a)||0,nb=parseInt(b)||0;
    return na!==nb?na-nb:a.localeCompare(b,'ru');
  });

  classes.forEach(function(cls){
    var dayArrays=sch[cls];
    var maxLessons=0;
    dayArrays.forEach(function(d){if(d.length>maxLessons)maxLessons=d.length;});
    if(maxLessons<1)maxLessons=7;

    /* Header row */
    var rows=[['Урок'].concat(days.slice(0,dayArrays.length))];
    for(var i=0;i<maxLessons;i++){
      var row=[i+1];
      dayArrays.forEach(function(d){
        var code=d[i]||'';
        row.push(SF[code]||code||'');
      });
      rows.push(row);
    }

    var ws=XLSX.utils.aoa_to_sheet(rows);

    /* Column widths */
    ws['!cols']=[{wch:6}].concat(days.slice(0,dayArrays.length).map(function(){return{wch:22};}));

    /* Style header row bold */
    var range=XLSX.utils.decode_range(ws['!ref']);
    for(var C=range.s.c;C<=range.e.c;C++){
      var addr=XLSX.utils.encode_cell({r:0,c:C});
      if(ws[addr]&&!ws[addr].s)ws[addr].s={font:{bold:true},fill:{fgColor:{rgb:'1A1A2E'}}};
    }

    var safeName=cls.replace(/[\/\\?*\[\]]/g,'');
    XLSX.utils.book_append_sheet(wb,ws,safeName);
  });

  /* Summary sheet with all classes */
  var sumRows=[['Класс'].concat(days)];
  classes.forEach(function(cls){
    var dayArrays=sch[cls];
    var maxLessons=0;
    dayArrays.forEach(function(d){if(d.length>maxLessons)maxLessons=d.length;});
    sumRows.push([cls]);
    for(var i=0;i<maxLessons;i++){
      var row=['  Урок '+(i+1)];
      dayArrays.forEach(function(d){row.push(SF[d[i]||'']||d[i]||'');});
      sumRows.push(row);
    }
    sumRows.push([]);
  });
  var wsSummary=XLSX.utils.aoa_to_sheet(sumRows);
  wsSummary['!cols']=[{wch:14}].concat(days.map(function(){return{wch:22};}));
  XLSX.utils.book_append_sheet(wb,wsSummary,'Все классы');

  var filename=(school?school.replace(/[\/\\?*\[\]:]/g,''):'Расписание')+'.xlsx';
  XLSX.writeFile(wb,filename);
}

/* ═══ Эпик 3.3: экстренные замены ═══ */
(function initSubstituteModal(){
  var btn = document.getElementById('schSubBtn');
  var overlay = document.getElementById('subOverlay');
  var closeBtn = document.getElementById('subCloseBtn');
  var runBtn = document.getElementById('subRunBtn');
  var teacherSel = document.getElementById('subTeacher');
  var daySel = document.getElementById('subDay');
  var resultEl = document.getElementById('subResult');

  // Показать кнопку только если есть curriculum (без неё не подобрать замены)
  if (!_schData || !_schData.curriculum || !_schData.curriculum.length || !btn) return;
  btn.style.display = '';

  // Заполнить селект учителей — уникальные по teacherId
  var teacherMap = {};
  _schData.curriculum.forEach(function(c){
    if (c.teacherId && c.teacherName) teacherMap[c.teacherId] = c.teacherName;
  });
  var options = Object.keys(teacherMap).sort(function(a,b){ return teacherMap[a].localeCompare(teacherMap[b],'ru'); });
  teacherSel.innerHTML = options.map(function(id){ return '<option value="'+id+'">'+teacherMap[id]+'</option>'; }).join('');

  function close(){ overlay.classList.remove('sub-overlay--open'); resultEl.style.display='none'; resultEl.innerHTML=''; }
  btn.addEventListener('click', function(){ overlay.classList.add('sub-overlay--open'); });
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });

  runBtn.addEventListener('click', function(){
    var absentTeacherId = teacherSel.value;
    var absentDay = Number(daySel.value);
    runBtn.disabled = true;
    runBtn.textContent = 'Ищем…';
    resultEl.style.display='block';
    resultEl.innerHTML = '<div style="color:#86868b">Подбираем замены…</div>';

    // Auth header
    function getHeaders(){
      if (typeof spAuthHeaders === 'function') return spAuthHeaders();
      return Promise.resolve({});
    }
    getHeaders().then(function(authH){
      var headers = Object.assign({'Content-Type':'application/json'}, authH);
      return fetch('/api/generate/substitute', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({
          schedule: _schData.sch,
          curriculum: _schData.curriculum,
          shifts: _schData.shifts || {},
          absentTeacherId: absentTeacherId,
          absentDay: absentDay,
        }),
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(resp){
      if (!resp || !resp.ok) {
        var msg = (resp && resp.error && (resp.error.message || resp.error)) || 'Ошибка';
        throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
      }
      if (!resp.affectedCount) {
        resultEl.innerHTML = '<div style="color:#30d158">✓ У этого учителя нет уроков в выбранный день — замена не нужна.</div>';
        return;
      }
      var html = '<p style="margin-bottom:10px;color:#f5f5f7;font-weight:600">Найдено '+resp.affectedCount+' урок(а) для замены:</p>';
      resp.suggestions.forEach(function(s){
        var teacherNames = (s.substitutes || []).map(function(tid){ return teacherMap[tid] || tid; }).join(', ');
        var msg = s.action === 'substitute'
          ? 'Заменить: <strong>' + (teacherNames || s.substitutes.join(', ')) + '</strong>'
          : s.message;
        html += '<div class="sub-item'+(s.action==='substitute'?'':' sub-item--none')+'">'
          + '<div class="sub-item__head">'+s.class+' · Урок '+s.slot+' · '+s.subject+'</div>'
          + '<div class="sub-item__msg">'+msg+'</div>'
          + '</div>';
      });
      resultEl.innerHTML = html;
    })
    .catch(function(err){
      resultEl.innerHTML = '<div style="color:#ff453a">Ошибка: '+(err.message||err)+'</div>';
    })
    .then(function(){
      runBtn.disabled = false;
      runBtn.textContent = 'Подобрать замены';
    });
  });
})();
</script>
</body>
</html>
