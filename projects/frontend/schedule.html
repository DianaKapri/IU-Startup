<style>
body{background:#000;color:#f5f5f7;min-height:100vh;}
.sch-page{max-width:1100px;margin:0 auto;padding:100px 24px 60px;}
.sch-header{margin-bottom:32px;}
.sch-eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#0071e3;margin-bottom:8px;}
.sch-title{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;letter-spacing:-.04em;color:#f5f5f7;margin-bottom:4px;}
.sch-sub{font-size:.9rem;color:#86868b;}
.sch-back{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:#86868b;text-decoration:none;margin-bottom:28px;transition:color .15s;}
.sch-back:hover{color:#f5f5f7;}
.sch-back svg{flex-shrink:0;}
.sch-panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px;margin-bottom:20px;}
.sch-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sch-cta-bar{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;}
.sch-btn{padding:10px 22px;border-radius:8px;font-size:.86rem;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:all .15s;font-family:var(--font);border:none;}
.sch-btn--primary{background:#0071e3;color:#fff;}
.sch-btn--primary:hover{background:#0077ed;}
.sch-btn--green{background:#22c55e;color:#fff;}
.sch-btn--green:hover{background:#16a34a;}
.sch-btn--ghost{background:transparent;color:#f5f5f7;border:1px solid rgba(255,255,255,.2);}
.sch-btn--ghost:hover{border-color:rgba(255,255,255,.4);}
.sch-stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.sch-stat{flex:1;min-width:100px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;}
.sch-stat__val{font-size:1.4rem;font-weight:700;color:#f5f5f7;line-height:1;}
.sch-stat__lbl{font-size:.7rem;color:#555;margin-top:4px;}
.sch-shift-tabs{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,.04);border-radius:10px;width:fit-content;}
.sch-shift-tab{background:transparent;border:none;color:#86868b;font-family:var(--font);font-size:.82rem;font-weight:500;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .15s;}
.sch-shift-tab:hover{color:#f5f5f7;}
.sch-shift-tab--active{background:rgba(0,113,227,.18);color:#4da3ff;}
/* Emergency substitution modal */
.sub-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;}
.sub-overlay--open{display:flex;}
.sub-modal{background:#1c1c1e;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:28px;max-width:560px;width:92%;max-height:85vh;overflow-y:auto;}
.sub-modal__title{font-size:1.2rem;font-weight:700;margin-bottom:16px;color:#f5f5f7;}
.sub-modal__row{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.sub-modal__label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:#86868b;font-weight:600;}
.sub-modal__sel{background:#2c2c2e;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;color:#f5f5f7;font-family:var(--font);font-size:.9rem;}
.sub-modal__sel:focus{border-color:#0071e3;outline:none;}
.sub-modal__actions{display:flex;gap:10px;margin-top:12px;}
.sub-modal__result{margin-top:18px;padding:14px;background:rgba(255,255,255,.04);border-radius:10px;font-size:.85rem;line-height:1.6;max-height:300px;overflow-y:auto;}
.sub-item{padding:10px 12px;margin-bottom:8px;background:rgba(255,255,255,.04);border-radius:8px;border-left:3px solid #30d158;}
.sub-item--none{border-left-color:#ff9f0a;}
.sub-item__head{font-weight:600;color:#f5f5f7;}
.sub-item__msg{font-size:.82rem;color:#86868b;margin-top:2px;}
/* View-switcher: по классам / по учителям */
.sch-view-tabs{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,.04);border-radius:10px;width:fit-content;margin-bottom:16px;}
.sch-view-tab{background:transparent;border:none;color:#86868b;font-family:var(--font);font-size:.86rem;font-weight:500;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .15s;}
.sch-view-tab:hover{color:#f5f5f7;}
.sch-view-tab--active{background:rgba(0,113,227,.18);color:#4da3ff;}
/* Список учителей — раскрывающиеся <details> */
.sch-teacher-wrap{display:flex;flex-direction:column;gap:8px;}
.teacher-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden;}
.teacher-item[open]{background:rgba(255,255,255,.05);border-color:rgba(0,113,227,.25);}
.teacher-item__head{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:12px;user-select:none;transition:background .15s;}
.teacher-item__head::-webkit-details-marker{display:none;}
.teacher-item__head:hover{background:rgba(255,255,255,.04);}
.teacher-item__arrow{width:12px;height:12px;flex-shrink:0;transition:transform .2s;color:#86868b;}
.teacher-item[open] .teacher-item__arrow{transform:rotate(90deg);color:#4da3ff;}
.teacher-item__name{font-size:.92rem;font-weight:600;color:#f5f5f7;flex:1;}
.teacher-item__meta{font-size:.76rem;color:#86868b;font-weight:400;}
.teacher-item__body{padding:0 16px 16px;}
.teacher-grid{width:100%;border-collapse:collapse;font-size:.82rem;}
.teacher-grid th,.teacher-grid td{border:1px solid rgba(255,255,255,.07);padding:5px 8px;text-align:center;vertical-align:middle;}
.teacher-grid th{color:#86868b;font-size:.72rem;font-weight:500;background:rgba(255,255,255,.02);}
.teacher-grid__num{color:#555;font-weight:500;width:40px;}
.teacher-grid__cell{color:#f5f5f7;}
.teacher-grid__cell--empty{color:#3a3a3c;}
.teacher-grid__class{font-weight:600;font-size:.78rem;}
.teacher-grid__subj{font-size:.7rem;color:#86868b;margin-top:1px;}
.teacher-grid__room{font-size:.68rem;color:#4da3ff;margin-top:1px;}
/* Сводка нарушений */
.sch-audit{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding:12px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;align-items:center;}
.sch-audit__label{font-size:.74rem;color:#86868b;font-weight:500;margin-right:4px;text-transform:uppercase;letter-spacing:.04em;}
.sch-audit__pill{display:inline-flex;gap:5px;align-items:center;padding:5px 10px;border-radius:20px;font-size:.78rem;font-weight:500;cursor:help;transition:transform .15s;}
.sch-audit__pill:hover{transform:translateY(-1px);}
.sch-audit__pill--hard{background:rgba(255,69,58,.15);color:#ff453a;border:1px solid rgba(255,69,58,.3);}
.sch-audit__pill--soft{background:rgba(255,159,10,.15);color:#ff9f0a;border:1px solid rgba(255,159,10,.3);}
.sch-audit__pill--ok{background:rgba(48,209,88,.15);color:#30d158;border:1px solid rgba(48,209,88,.3);}
.sch-audit__pill-id{font-weight:700;font-size:.72rem;opacity:.85;}
.sch-audit__pill-cnt{font-size:.72rem;opacity:.85;}
/* Кабинет в ячейке расписания по классам (engine.js renderGrid) */
.demo__cell-room{font-size:.6rem;font-weight:500;color:rgba(255,255,255,.85);background:rgba(0,0,0,.3);padding:0 4px;border-radius:3px;line-height:1.3;margin-top:1px;}

/* ═══ PDF/Print вёрстка — Эпик 2.3.2 ═══ */
@media print {
  body { background: #fff !important; color: #000 !important; }
  .nav, .sch-back, .sch-stat-row, .sch-shift-tabs, .sch-cta-bar,
  .sub-overlay, #schSubBtn { display: none !important; }
  .sch-page { padding: 0 !important; max-width: 100% !important; }
  .sch-header { margin-bottom: 12px !important; }
  .sch-title { color: #000 !important; font-size: 18pt !important; }
  .sch-eyebrow, .sch-sub { color: #555 !important; }
  .sch-panel { background: #fff !important; border: 1px solid #ccc !important; }
  .acc-grid-tbl { font-size: 8pt !important; border-collapse: collapse; width: 100%; }
  .acc-grid-tbl th, .acc-grid-tbl td {
    border: 1px solid #999 !important;
    background: #fff !important;
    color: #000 !important;
    padding: 3px 5px !important;
  }
  .acc-grid-tbl th { background: #f0f0f0 !important; font-weight: 700; }
  @page { size: A3 landscape; margin: 10mm; }
}
</style>
</head>

<div class="sch-page">
  <a href="./index.html#wizard-section" class="sch-back" id="schBack"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Назад к мастеру</a>

<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

<script>
var _schData=null;

(function(){
  var src = localStorage.getItem('shkolaplan_wizard_source');
  var backLink = document.getElementById('schBack');
  if (backLink && src === 'account') backLink.href = './account.html';

  var openId = localStorage.getItem('shkolaplan_wizard_open_item');
  if (openId && !sessionStorage.getItem('wizSchedule')) {
    try {
      var runs = JSON.parse(localStorage.getItem('shkolaplan_wizard_runs') || '[]');
      var picked = runs.find(function (r) { return r.id === openId; });
      if (picked && picked.payload) sessionStorage.setItem('wizSchedule', JSON.stringify(picked.payload));
    } catch (_) {}
  }
  localStorage.removeItem('shkolaplan_wizard_open_item');

  var raw;
  try{raw=sessionStorage.getItem('wizSchedule');}catch(e){}
  if(!raw){
    document.getElementById('schTitle').textContent='Нет данных';
    document.getElementById('schSub').textContent='Вернитесь и заполните мастер составления расписания';
    return;
  }
  var data=JSON.parse(raw);
  _schData=data;
  var sch=data.sch,cg=data.cg,school=data.school||'';

  if(school){
    document.getElementById('schTitle').textContent='Расписание — '+school;
    document.title='Расписание | '+school+' | ШколаПлан';
  }

  var classCount=Object.keys(sch).length;
  var totalLessons=0;
  Object.keys(sch).forEach(function(c){sch[c].forEach(function(d){d.forEach(function(l){if(l)totalLessons++;});});});
  var audit=doAudit(sch,cg);
  var violations=audit.vi?audit.vi.length:0;

  var statsEl=document.getElementById('schStats');
  statsEl.innerHTML=[
    {v:classCount,l:'Классов'},
    {v:totalLessons,l:'Уроков / неделю'},
    {v:audit.score!==undefined?audit.score:'—',l:'Оценка качества'},
    {v:violations,l:'Нарушений СанПиН'}
  ].map(function(s){
    return '<div class="sch-stat"><div class="sch-stat__val">'+s.v+'</div><div class="sch-stat__lbl">'+s.l+'</div></div>';
  }).join('');

  // Эпик 3.1: если в payload есть разделение на смены — показываем табы-фильтр
  var shifts = data.shifts || {};
  var shiftSet = {};
  Object.keys(shifts).forEach(function(c){ shiftSet[shifts[c]] = true; });
  var hasTwoShifts = shiftSet[1] && shiftSet[2];
  if (hasTwoShifts) {
    document.getElementById('schShiftTabs').style.display = 'flex';
  }

  function filterByShift(target) {
    if (target === 'all') return sch;
    var filt = {};
    Object.keys(sch).forEach(function(cls){
      if ((shifts[cls] || 1) === target) filt[cls] = sch[cls];
    });
    return filt;
  }

  // Карта кабинетов: ключ "ClassId:Subject" → room (если curriculum есть)
  var roomsMap = {};
  if (data.curriculum && data.curriculum.length) {
    data.curriculum.forEach(function(c){
      if (c.classId && c.subject && c.roomId) {
        roomsMap[c.classId + ':' + c.subject] = c.roomId;
      }
    });
  }

  function renderAuditBar(au) {
    var bar = document.getElementById('schAuditBar');
    if (!bar) return;
    var vi = au.vi || [], wa = au.wa || [];
    if (!vi.length && !wa.length) {
      bar.style.display='flex';
      bar.innerHTML = '<span class="sch-audit__pill sch-audit__pill--ok">✓ Нарушений нет</span>';
      return;
    }
    // Группируем по ruleId
    var byId = {};
    vi.concat(wa).forEach(function(v){
      var k = v.id || '?';
      if (!byId[k]) byId[k] = { id: v.id, nm: v.nm, st: v.st, count: 0, examples: [] };
      byId[k].count++;
      if (byId[k].examples.length < 5) byId[k].examples.push(v.ds || '');
    });
    var pills = Object.values(byId).sort(function(a,b){
      if (a.st !== b.st) return a.st === 'v' ? -1 : 1;
      return b.count - a.count;
    });
    var html = '<span class="sch-audit__label">Аудит:</span>';
    pills.forEach(function(p){
      var cls = p.st === 'v' ? 'sch-audit__pill--hard' : 'sch-audit__pill--soft';
      var tooltip = p.nm + (p.examples.length ? '\n— ' + p.examples.join('\n— ') : '');
      html += '<span class="sch-audit__pill ' + cls + '" title="' + (p.nm + ': ' + p.examples.join(' · ')).replace(/"/g,'&quot;') + '">'
            + '<span class="sch-audit__pill-id">' + p.id + '</span>'
            + '<span>' + p.nm + '</span>'
            + '<span class="sch-audit__pill-cnt">×' + p.count + '</span>'
            + '</span>';
    });
    bar.style.display='flex';
    bar.innerHTML = html;
  }

  function render(target) {
    var filt = filterByShift(target);
    var tbl = document.getElementById('schGridTbl');
    var au = doAudit(filt, cg);
    renderGrid(filt, cg, au, tbl, false, undefined, roomsMap);
    renderAuditBar(au);
  }
  render('all');

  Array.prototype.forEach.call(document.querySelectorAll('.sch-shift-tab'), function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.sch-shift-tab').forEach(function(b){ b.classList.remove('sch-shift-tab--active'); });
      btn.classList.add('sch-shift-tab--active');
      var sh = btn.getAttribute('data-shift');
      render(sh === 'all' ? 'all' : Number(sh));
    });
  });

  // ═══ View-switcher: По классам / По учителям ═══
  var hasCurriculum = _schData.curriculum && _schData.curriculum.length;
  var hasOriginalSch = _schData.originalSch;
  if (hasCurriculum && hasOriginalSch) {
    document.getElementById('schViewTeacherBtn').style.display = '';
  }

  // Эпик 1.1.3: «Другой вариант» — регенерация с новым seed
  if (hasCurriculum) {
    var regenBtn = document.getElementById('schRegenBtn');
    regenBtn.style.display = '';
    regenBtn.addEventListener('click', function(){
      if (!confirm('Сгенерировать альтернативный вариант расписания? Текущий останется в истории.')) return;
      var origLabel = regenBtn.textContent;
      regenBtn.disabled = true;
      regenBtn.textContent = 'Генерируется…';

      function getHeaders(){
        if (typeof _initSupabase !== 'function') return Promise.resolve({});
        return _initSupabase().then(function(sb){
          return sb.auth.getSession().then(function(res){
            var t = res.data && res.data.session && res.data.session.access_token;
            return t ? { Authorization: 'Bearer ' + t } : {};
          });
        }).catch(function(){ return {}; });
      }

      var newSeed = Math.floor(Math.random() * 1000000) + 1;
      var weekDays = 5;
      // Восстанавливаем classes из curriculum
      var classSet = {};
      (_schData.curriculum||[]).forEach(function(c){ if (c.classId) classSet[c.classId] = true; });
      var classes = Object.keys(classSet);

      getHeaders().then(function(authH){
        var headers = Object.assign({'Content-Type':'application/json'}, authH);
        return fetch('/api/generate', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({
            classes: classes,
            curriculum: _schData.curriculum,
            weekDays: weekDays,
            seed: newSeed,
            shifts: _schData.shifts,
          }),
        });
      })
      .then(function(r){ return r.json(); })
      .then(function(resp){
        if (!resp || !resp.ok) {
          var msg = (resp && resp.error && (resp.error.message || resp.error)) || 'Не удалось';
          throw new Error(typeof msg==='string' ? msg : JSON.stringify(msg));
        }
        var originalSch = JSON.parse(JSON.stringify(resp.schedule));
        var newSch = {};
        Object.keys(resp.schedule).forEach(function(cls){

          });
        });
        var newCg = {};
        Object.keys(newSch).forEach(function(cls){

          newCg[cls] = m ? parseInt(m[1],10) : 7;
        });
        var built = {
          sch: newSch, cg: newCg,
          school: _schData.school || '',
          originalSch: originalSch,
          shifts: _schData.shifts || {},
          curriculum: _schData.curriculum || [],
          teachers: _schData.teachers || [],
        };
        var title = 'Вариант — ' + (_schData.school || 'Без названия') + ' (seed ' + newSeed + ')';
        if (typeof saveWizardRun === 'function') {
          var id = saveWizardRun('schedule', title, built);
          localStorage.setItem('shkolaplan_wizard_source', 'account');
          localStorage.setItem('shkolaplan_wizard_open_item', id);
        }
        try { sessionStorage.setItem('wizSchedule', JSON.stringify(built)); } catch(e){}

      })
      .catch(function(err){
        alert('Ошибка: ' + (err.message || err));
        regenBtn.disabled = false;
        regenBtn.textContent = origLabel;
      });
    });
  }

  Array.prototype.forEach.call(document.querySelectorAll('.sch-view-tab'), function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.sch-view-tab').forEach(function(b){ b.classList.remove('sch-view-tab--active'); });
      btn.classList.add('sch-view-tab--active');
      var v = btn.getAttribute('data-view');
      if (v === 'teachers') {
        document.getElementById('schClassView').style.display = 'none';
        document.getElementById('schShiftTabs').style.display = 'none';
        document.getElementById('schTeacherView').style.display = 'flex';
        renderTeacherView();
      } else {
        document.getElementById('schClassView').style.display = '';
        if (hasTwoShifts) document.getElementById('schShiftTabs').style.display = 'flex';
        document.getElementById('schTeacherView').style.display = 'none';
      }
    });
  });

  function escH(s){ return String(s||'').replace(/[<>&"']/g, function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];}); }

  function renderTeacherView(){
    var container = document.getElementById('schTeacherView');
    var origSch = _schData.originalSch;
    var curriculum = _schData.curriculum || [];
    if (!origSch || !curriculum.length) {
      container.innerHTML = '<p style="color:#86868b">Нет данных по учителям. Сгенерируйте расписание заново через Excel-шаблон.</p>';
      return;
    }

    // Построить map: teacherId → { name, days[5 или 6][slots] }
    var numD = 5;
    Object.keys(origSch).forEach(function(cls){ if (origSch[cls].length > numD) numD = origSch[cls].length; });

    var teachers = {};
    curriculum.forEach(function(c){
      if (!c.teacherId || !c.teacherName) return;
      if (!teachers[c.teacherId]) {
        teachers[c.teacherId] = {
          name: c.teacherName,
          days: Array.from({length: numD}, function(){ return []; }),
          lessonCount: 0,
          classes: {},
        };
      }
    });

    // Пройтись по расписанию — для каждого слота найти учителя по (cls, subject)
    Object.keys(origSch).forEach(function(cls){
      origSch[cls].forEach(function(day, di){
        day.forEach(function(subj, si){
          if (!subj) return;
          var entry = curriculum.find(function(c){ return c.classId === cls && c.subject === subj; });
          if (!entry || !teachers[entry.teacherId]) return;
          var t = teachers[entry.teacherId];
          while (t.days[di].length < si + 1) t.days[di].push(null);
          t.days[di][si] = { class: cls, subject: subj };
          t.lessonCount++;
          t.classes[cls] = true;

    var dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб'];

    var html = '';
    Object.keys(teachers).sort(function(a,b){
      return teachers[a].name.localeCompare(teachers[b].name, 'ru');
    }).forEach(function(tid){
      var t = teachers[tid];
      if (t.lessonCount === 0) return;
      var maxSlots = 0;
      t.days.forEach(function(day){ if (day.length > maxSlots) maxSlots = day.length; });

      var classList = Object.keys(t.classes).sort(function(a,b){
        var na=parseInt(a)||0, nb=parseInt(b)||0;
        return na!==nb?na-nb:a.localeCompare(b,'ru');
      }).join(', ');

      html += '<details class="teacher-item">';
      html += '<summary class="teacher-item__head">' + ARROW_SVG
            + '<span class="teacher-item__name">' + escH(t.name) + '</span>'
            + '<span class="teacher-item__meta">' + t.lessonCount + ' ур./нед · ' + classList + '</span>'
            + '</summary>';
      html += '<div class="teacher-item__body">';

      for (var di = 0; di < numD; di++) html += '<th>' + dayNames[di] + '</th>';
      html += '</tr></thead><tbody>';
      for (var si = 0; si < maxSlots; si++) {
        html += '<tr><td class="teacher-grid__num">' + (si+1) + '</td>';
        for (var di2 = 0; di2 < numD; di2++) {
          var cell = (t.days[di2] || [])[si];
          if (cell) {
            var roomId = (_schData.curriculum||[]).find(function(c){return c.classId===cell.class && c.subject===cell.subject;});
            var roomStr = roomId && roomId.roomId ? roomId.roomId : '';
            html += '<td class="teacher-grid__cell">'
                  + '<div class="teacher-grid__class">' + escH(cell.class) + '</div>'
                  + '<div class="teacher-grid__subj">' + escH(cell.subject) + '</div>'
                  + (roomStr ? '<div class="teacher-grid__room">каб. ' + escH(roomStr) + '</div>' : '')
                  + '</td>';
          } else {
            html += '<td class="teacher-grid__cell teacher-grid__cell--empty">—</td>';
          }
        }
        html += '</tr>';
      }
      html += '</tbody></table></div></details>';
    });

    container.innerHTML = html || '<p style="color:#86868b">Нет данных по учителям.</p>';
  }
})();

function downloadExcel(){
  if(!_schData){return;}
  var sch=_schData.sch, school=_schData.school||'Расписание';
  var dayNames=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];

  // Классы — отсортированы по номеру параллели, потом алфавит
  var classes=Object.keys(sch).sort(function(a,b){
    var na=parseInt(a)||0, nb=parseInt(b)||0;
    return na!==nb?na-nb:a.localeCompare(b,'ru');
  });
  if(!classes.length){return;}

  // Сколько дней в неделе (по максимуму в расписании)
  var numD=0;
  classes.forEach(function(cls){ if(sch[cls].length>numD) numD=sch[cls].length; });
  if(numD<5) numD=5;

  // Сколько уроков в день (макс по всем классам и дням)
  var maxLessons=0;
  classes.forEach(function(cls){
    sch[cls].forEach(function(d){ if(d.length>maxLessons) maxLessons=d.length; });
  });
  if(maxLessons<1) maxLessons=7;

  // Формат: одна сетка — строки = (День × Урок), колонки = классы.
  //   День | Урок | 5А | 5Б | 6А | ... | 10А
  //   Пн    1    Мат   Рус   Мат         ...
  //   Пн    2    ...
  //   ...
  //   Вт    1    ...
  var rows=[];
  // Заголовок
  rows.push(['День','Урок'].concat(classes));

  for(var d=0; d<numD; d++){
    for(var s=0; s<maxLessons; s++){
      var row=[s===0?dayNames[d]:'', s+1];
      classes.forEach(function(cls){
        var dayArr=sch[cls][d]||[];
        var code=dayArr[s]||'';
        row.push(SF[code]||code||'');
      });
      rows.push(row);
    }
    // Пустая строка-разделитель между днями (кроме последнего)
    if(d<numD-1) rows.push([]);
  }

  var ws=XLSX.utils.aoa_to_sheet(rows);

  // Ширины колонок: День 14, Урок 6, каждый класс 14
  ws['!cols']=[{wch:14},{wch:6}].concat(classes.map(function(){return{wch:14};}));

  // Слияние ячеек «День» по вертикали для каждого дня
  ws['!merges']=ws['!merges']||[];
  var curRow=1; // после header
  for(var d2=0; d2<numD; d2++){
    ws['!merges'].push({ s:{r:curRow,c:0}, e:{r:curRow+maxLessons-1,c:0} });
    curRow += maxLessons + 1; // +1 за разделитель
  }

  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'По классам');

  // Второй лист «По учителям» — если есть curriculum и originalSch
  var origSch = _schData.originalSch;
  var curr = _schData.curriculum || [];
  if (origSch && curr.length) {
    var tsh = buildTeacherScheduleData(origSch, curr);
    var trows = [['Учитель','День','Урок','Класс','Предмет','Кабинет']];
    var dayShort = ['Пн','Вт','Ср','Чт','Пт','Сб'];
    var teacherIds = Object.keys(tsh).sort(function(a,b){
      return tsh[a].name.localeCompare(tsh[b].name, 'ru');
    });
    teacherIds.forEach(function(tid){
      var t = tsh[tid];
      if (!t.lessonCount) return;
      for (var di = 0; di < t.days.length; di++) {
        for (var si = 0; si < t.days[di].length; si++) {
          var cell = t.days[di][si];
          if (!cell) continue;
          trows.push([t.name, dayShort[di], si+1, cell.class, cell.subject, cell.room || '']);
        }
      }
      trows.push([]); // пустая строка между учителями
    });
    var tws = XLSX.utils.aoa_to_sheet(trows);
    tws['!cols'] = [{wch:30},{wch:6},{wch:6},{wch:8},{wch:20},{wch:10}];
    XLSX.utils.book_append_sheet(wb, tws, 'По учителям');
  }

  var filename=(school?school.replace(/[\/\\?*\[\]:]/g,''):'Расписание')+'.xlsx';
  XLSX.writeFile(wb,filename);
}

// Общая функция: строит map teacherId → {name, days[][], lessonCount, classes}
function buildTeacherScheduleData(origSch, curriculum){
  var teachers = {};
  curriculum.forEach(function(c){
    if (!c.teacherId || !c.teacherName) return;
    if (!teachers[c.teacherId]) {
      teachers[c.teacherId] = {
        name: c.teacherName,
        days: [[],[],[],[],[],[]],
        lessonCount: 0,
        classes: {},
      };
    }
  });
  Object.keys(origSch).forEach(function(cls){
    origSch[cls].forEach(function(day, di){
      day.forEach(function(subj, si){
        if (!subj) return;
        var entry = curriculum.find(function(c){ return c.classId === cls && c.subject === subj; });
        if (!entry || !teachers[entry.teacherId]) return;
        var t = teachers[entry.teacherId];
        while (t.days[di].length < si + 1) t.days[di].push(null);
        t.days[di][si] = { class: cls, subject: subj, room: entry.roomId || '' };
        t.lessonCount++;
        t.classes[cls] = true;
      });
    });
  });
  return teachers;
}

function downloadPDF(){
  if(!_schData){return;}
  var school=_schData.school||'Расписание';
  var dateStr=new Date().toLocaleDateString('ru-RU');
  var sch=_schData.sch;
  var dayNames=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];

  var classes=Object.keys(sch).sort(function(a,b){
    var na=parseInt(a)||0, nb=parseInt(b)||0;
    return na!==nb?na-nb:a.localeCompare(b,'ru');
  });
  if(!classes.length){ alert('Нет данных для PDF'); return; }

  var numD=0;
  classes.forEach(function(cls){ if(sch[cls].length>numD) numD=sch[cls].length; });
  if(numD<5) numD=5;
  var maxLessons=0;
  classes.forEach(function(cls){
    sch[cls].forEach(function(d){ if(d.length>maxLessons) maxLessons=d.length; });
  });
  if(maxLessons<1) maxLessons=7;

  // Строим HTML-блок для печати
  var html='<div style="font-family:DM Sans,sans-serif;padding:20px;color:#000;background:#fff">';
  html+='<h1 style="margin:0 0 4px;font-size:18pt">'+escH(school)+'</h1>';
  html+='<p style="margin:0 0 16px;font-size:10pt;color:#555">Сгенерировано '+dateStr+' · ШколаПлан</p>';

  html+='<th style="border:1px solid #888;padding:5px;width:70px">День</th>';
  html+='<th style="border:1px solid #888;padding:5px;width:40px">Урок</th>';
  classes.forEach(function(cls){
    html+='<th style="border:1px solid #888;padding:5px">'+escH(cls)+'</th>';
  });
  html+='</tr></thead><tbody>';

  for(var d=0; d<numD; d++){
    var dayBg = d%2===0 ? '#fff' : '#fafafa';
    for(var s=0; s<maxLessons; s++){
      html+='<tr style="background:'+dayBg+'">';
      if(s===0){
        html+='<td rowspan="'+maxLessons+'" style="border:1px solid #888;padding:5px;font-weight:700;text-align:center;vertical-align:middle">'+dayNames[d]+'</td>';
      }
      html+='<td style="border:1px solid #888;padding:5px;text-align:center;font-weight:600">'+(s+1)+'</td>';
      classes.forEach(function(cls){
        var dayArr=sch[cls][d]||[];
        var code=dayArr[s]||'';
        var text=SF[code]||code||'';
        var roomId='';
        if(_schData.curriculum){
          var fullSubj=SF[code]||code;
          var entry=_schData.curriculum.find(function(c){return c.classId===cls && c.subject===fullSubj;});
          if(entry&&entry.roomId) roomId=entry.roomId;
        }
        html+='<td style="border:1px solid #888;padding:5px">'+escH(text)
            +(roomId?'<div style="font-size:6pt;color:#555;margin-top:1px">каб. '+escH(roomId)+'</div>':'')
            +'</td>';
      });
      html+='</tr>';
    }
  }
  html+='</tbody></table>';

  // Вторая секция: по учителям (каждый на новой странице)
  var origSch=_schData.originalSch;
  var curr=_schData.curriculum||[];
  if (origSch && curr.length) {
    var teachers = buildTeacherScheduleData(origSch, curr);
    var tids = Object.keys(teachers).sort(function(a,b){
      return teachers[a].name.localeCompare(teachers[b].name, 'ru');
    });
    var dayShort = ['Пн','Вт','Ср','Чт','Пт','Сб'];
    tids.forEach(function(tid){
      var t = teachers[tid];
      if (!t.lessonCount) return;
      var maxSlots = 0;
      t.days.forEach(function(day){ if (day.length > maxSlots) maxSlots = day.length; });

      html += '<div style="page-break-before:always;padding-top:20px;">';
      html += '<h2 style="margin:0 0 4px;font-size:14pt">'+escH(t.name)+'</h2>';
      html += '<p style="margin:0 0 12px;font-size:9pt;color:#555">'+t.lessonCount+' уроков/нед · Классы: '
            + Object.keys(t.classes).sort(function(a,b){
                var na=parseInt(a)||0, nb=parseInt(b)||0;
                return na!==nb?na-nb:a.localeCompare(b,'ru');
              }).join(', ')+'</p>';
      html += '<table style="width:100%;border-collapse:collapse;font-size:9pt">';
      html += '<thead><tr style="background:#e5e7eb;font-weight:700">'
            + '<th style="border:1px solid #888;padding:5px;width:50px">Урок</th>';
      for (var d2 = 0; d2 < numD; d2++) html += '<th style="border:1px solid #888;padding:5px">'+dayShort[d2]+'</th>';
      html += '</tr></thead><tbody>';
      for (var s2 = 0; s2 < maxSlots; s2++) {
        html += '<tr><td style="border:1px solid #888;padding:5px;text-align:center;font-weight:600">'+(s2+1)+'</td>';
        for (var d3 = 0; d3 < numD; d3++) {
          var cell = (t.days[d3] || [])[s2];
          if (cell) {
            html += '<td style="border:1px solid #888;padding:5px;text-align:center">'
                  + '<div style="font-weight:600">'+escH(cell.class)+'</div>'
                  + '<div style="font-size:8pt;color:#555">'+escH(cell.subject)+'</div>'
                  + (cell.room?'<div style="font-size:7pt;color:#0071e3">каб. '+escH(cell.room)+'</div>':'')
                  + '</td>';
          } else {
            html += '<td style="border:1px solid #888;padding:5px;text-align:center;color:#ccc">—</td>';
          }
        }
        html += '</tr>';
      }
      html += '</tbody></table></div>';
    });
  }

  html+='</div>';

  function escH(s){ return String(s||'').replace(/[<>&"']/g, function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];}); }

  // Временный контейнер для html2pdf (вне viewport'а)
  var container=document.createElement('div');
  container.style.position='absolute';
  container.style.left='-9999px';
  container.innerHTML=html;
  document.body.appendChild(container);

  var filename=(school?school.replace(/[\/\\?*\[\]:]/g,''):'Расписание')+'.pdf';
  html2pdf()
    .from(container)
    .set({
      margin: [10,10,10,10],
      filename: filename,
      image: { type:'jpeg', quality:0.95 },
      html2canvas: { scale:2, useCORS:true },
      jsPDF: { unit:'mm', format:'a3', orientation:'landscape' },
    })
    .save()
    .then(function(){ document.body.removeChild(container); })
    .catch(function(err){ console.error('PDF error:',err); document.body.removeChild(container); alert('Ошибка генерации PDF: '+err.message); });
}

(function initSubstituteModal(){
  var btn = document.getElementById('schSubBtn');
  var overlay = document.getElementById('subOverlay');
  var closeBtn = document.getElementById('subCloseBtn');
  var runBtn = document.getElementById('subRunBtn');
  var teacherSel = document.getElementById('subTeacher');
  var daySel = document.getElementById('subDay');
  var resultEl = document.getElementById('subResult');

  // Показать кнопку только если есть curriculum (без неё не подобрать замены)
  if (!_schData || !_schData.curriculum || !_schData.curriculum.length || !btn) return;
  btn.style.display = '';

  // Заполнить селект учителей — уникальные по teacherId
  var teacherMap = {};
  _schData.curriculum.forEach(function(c){
    if (c.teacherId && c.teacherName) teacherMap[c.teacherId] = c.teacherName;
  });
  var options = Object.keys(teacherMap).sort(function(a,b){ return teacherMap[a].localeCompare(teacherMap[b],'ru'); });
  teacherSel.innerHTML = options.map(function(id){ return '<option value="'+id+'">'+teacherMap[id]+'</option>'; }).join('');

  function close(){ overlay.classList.remove('sub-overlay--open'); resultEl.style.display='none'; resultEl.innerHTML=''; }
  btn.addEventListener('click', function(){ overlay.classList.add('sub-overlay--open'); });
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });

  runBtn.addEventListener('click', function(){
    var absentTeacherId = teacherSel.value;
    var absentDay = Number(daySel.value);
    runBtn.disabled = true;
    runBtn.textContent = 'Ищем…';
    resultEl.style.display='block';
    resultEl.innerHTML = '<div style="color:#86868b">Подбираем замены…</div>';

    // Auth header — используем _initSupabase из auth.js
    function getHeaders(){
      if (typeof _initSupabase !== 'function') return Promise.resolve({});
      return _initSupabase().then(function(sb){
        return sb.auth.getSession().then(function(res){
          var token = res.data && res.data.session && res.data.session.access_token;
          return token ? { Authorization: 'Bearer ' + token } : {};
        });
      }).catch(function(){ return {}; });
    }
    getHeaders().then(function(authH){
      var headers = Object.assign({'Content-Type':'application/json'}, authH);
      // Используем оригинальное расписание с полными именами предметов
      // (в _schData.sch они нормализованы для UI и не совпадут с curriculum).
      var scheduleForSub = _schData.originalSch || _schData.sch;
      return fetch('/api/generate/substitute', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({
          schedule: scheduleForSub,
          curriculum: _schData.curriculum,
          shifts: _schData.shifts || {},
          absentTeacherId: absentTeacherId,
          absentDay: absentDay,
        }),
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(resp){
      if (!resp || !resp.ok) {
        var msg = (resp && resp.error && (resp.error.message || resp.error)) || 'Ошибка';
        throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
      }
      if (!resp.affectedCount) {
        resultEl.innerHTML = '<div style="color:#30d158">✓ У этого учителя нет уроков в выбранный день — замена не нужна.</div>';
        return;
      }
      var html = '<p style="margin-bottom:10px;color:#f5f5f7;font-weight:600">Найдено '+resp.affectedCount+' урок(а) для замены:</p>';
      resp.suggestions.forEach(function(s){
        var teacherNames = (s.substitutes || []).map(function(tid){ return teacherMap[tid] || tid; }).join(', ');
        var msg = s.action === 'substitute'
          ? 'Заменить: <strong>' + (teacherNames || s.substitutes.join(', ')) + '</strong>'
          : s.message;
        html += '<div class="sub-item'+(s.action==='substitute'?'':' sub-item--none')+'">'
          + '<div class="sub-item__head">'+s.class+' · Урок '+s.slot+' · '+s.subject+'</div>'
          + '<div class="sub-item__msg">'+msg+'</div>'
          + '</div>';
      });
      resultEl.innerHTML = html;
    })
    .catch(function(err){
      resultEl.innerHTML = '<div style="color:#ff453a">Ошибка: '+(err.message||err)+'</div>';
    })
    .then(function(){
      runBtn.disabled = false;
      runBtn.textContent = 'Подобрать замены';
    });
