<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8"/>
<link rel="icon" href="/assets/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/assets/favicon-mob.png"><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Войти — ШколаПлан</title>
<link rel="stylesheet" href="/css/styles.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

<nav class="nav nav--dark" id="nav"><div class="nav__inner">
  <a href="/" class="nav__logo"><svg class="nav__logo-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="1" y="1" width="8" height="8" rx="1.5" fill="currentColor" opacity=".9"/><rect x="11" y="1" width="8" height="8" rx="1.5" fill="currentColor" opacity=".5"/><rect x="1" y="11" width="8" height="8" rx="1.5" fill="currentColor" opacity=".5"/><rect x="11" y="11" width="8" height="8" rx="1.5" fill="currentColor" opacity=".3"/></svg> ШколаПлан</a>
  <div class="nav__center">
    <a href="/#features" class="nav__link">Возможности</a>
    <a href="/demo.html" class="nav__link">Демо</a>
  </div>
  <div class="nav__right">
    <a href="/" class="nav__link">← На главную</a>
  </div>
</div></nav>

<main class="auth-wrap"><div class="auth-box">
  <div class="auth-tabs" id="authTabs">
    <button class="auth-tab auth-tab--active" data-tab="login" id="tabLogin">Войти</button>
    <button class="auth-tab" data-tab="register" id="tabRegister">Регистрация</button>
  </div>

  <form class="auth-form" id="loginForm">
    <h2 class="auth-form__title">С возвращением</h2>
    <div class="field">
      <label class="field__label" for="loginEmail">Email</label>
      <input class="field__input" id="loginEmail" type="email" placeholder="school@example.ru" autocomplete="email"/>
    </div>
    <div class="field">
      <label class="field__label" for="loginPass">Пароль</label>
      <input class="field__input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <p class="auth-form__err" id="loginErr"></p>
    <button class="btn btn--primary btn--full" type="submit" id="loginBtn">Войти</button>
    <p class="auth-form__switch">Нет аккаунта? <button type="button" class="auth-form__link" data-switch="register">Зарегистрироваться</button></p>
  </form>

  <form class="auth-form" id="registerForm" style="display:none">
    <h2 class="auth-form__title">Создать аккаунт</h2>
    <div class="field">
      <label class="field__label" for="userName">ФИО</label>
      <input class="field__input" id="userName" type="text" placeholder="Мария Петровна" autocomplete="name"/>
    </div>
    <div class="field">
      <label class="field__label" for="schoolName">Название школы</label>
      <input class="field__input" id="schoolName" type="text" placeholder="МБОУ СОШ №42"/>
    </div>
    <div class="field">
      <label class="field__label" for="city">Город</label>
      <input class="field__input" id="city" type="text" placeholder="Москва"/>
    </div>
    <div class="field">
      <label class="field__label" for="regEmail">Email</label>
      <input class="field__input" id="regEmail" type="email" placeholder="school@example.ru" autocomplete="email"/>
    </div>
    <div class="field">
      <label class="field__label" for="regPass">Пароль</label>
      <input class="field__input" id="regPass" type="password" placeholder="минимум 6 символов" autocomplete="new-password"/>
    </div>
    <p class="auth-form__err" id="regErr"></p>
    <button class="btn btn--primary btn--full" type="submit" id="regBtn">Зарегистрироваться</button>
    <p class="auth-form__switch">Уже есть аккаунт? <button type="button" class="auth-form__link" data-switch="login">Войти</button></p>
  </form>

  <div class="auth-form" id="confirmPanel" style="display:none">
    <div style="text-align:center;padding:16px 0 8px">
      <div style="width:56px;height:56px;border-radius:50%;background:rgba(41,151,255,.12);border:1.5px solid #2997ff;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;">✉️</div>
      <h2 class="auth-form__title" style="margin-bottom:10px">Подтвердите email</h2>
      <p style="color:#86868b;font-size:.9rem;line-height:1.6;margin-bottom:24px">
        Мы отправили письмо на <strong id="confirmEmail" style="color:#f5f5f7"></strong>.<br/>
        Перейдите по ссылке в письме, чтобы активировать аккаунт.
      </p>
      <p style="color:#555;font-size:.8rem;margin-bottom:20px">Не получили письмо? Проверьте папку «Спам».</p>
      <button class="btn btn--ghost btn--full" type="button" onclick="document.getElementById('confirmPanel').style.display='none';document.getElementById('loginForm').style.display='';document.getElementById('tabLogin').classList.add('auth-tab--active');document.getElementById('tabRegister').classList.remove('auth-tab--active');">
        Войти
      </button>
    </div>
  </div>
</div></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/auth.js"></script>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  if(params.get('tab')==='register'){
    document.getElementById('tabLogin').classList.remove('auth-tab--active');
    document.getElementById('tabRegister').classList.add('auth-tab--active');
    document.getElementById('loginForm').style.display='none';
    document.getElementById('registerForm').style.display='';
  }

  document.querySelectorAll('.auth-tab').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.auth-tab').forEach(function(b){ b.classList.remove('auth-tab--active'); });
      btn.classList.add('auth-tab--active');
      var t = btn.dataset.tab;
      document.getElementById('loginForm').style.display = t==='login' ? '' : 'none';
      document.getElementById('registerForm').style.display = t==='register' ? '' : 'none';
    });
  });

  document.querySelectorAll('[data-switch]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var t = btn.dataset.switch;
      document.querySelectorAll('.auth-tab').forEach(function(b){
        b.classList.toggle('auth-tab--active', b.dataset.tab===t);
      });
      document.getElementById('loginForm').style.display = t==='login' ? '' : 'none';
      document.getElementById('registerForm').style.display = t==='register' ? '' : 'none';
    });
  });

  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    if (!cooldown('login')) return;
    var email = document.getElementById('loginEmail').value.trim();
    var pass  = document.getElementById('loginPass').value;
    var err   = document.getElementById('loginErr');
    var btn   = document.getElementById('loginBtn');
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Входим…';
    spLogin(email, pass).then(function(res){
      if(res.ok){
        var next = new URLSearchParams(location.search).get('next') || '/account.html';
        location.href = next;
      } else {
        err.textContent = res.error;
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    }).catch(function(e){
      console.error('[Login error]', e);
      err.textContent = 'Ошибка подключения к серверу. Проверьте интернет или попробуйте позже.';
      btn.disabled = false;
      btn.textContent = 'Войти';
    });
  });

  document.getElementById('registerForm').addEventListener('submit', function(e){
    e.preventDefault();
    if (!cooldown('register')) return;
    var name   = document.getElementById('userName').value.trim();
    var school = document.getElementById('schoolName').value.trim();
    var city   = document.getElementById('city').value.trim();
    var email  = document.getElementById('regEmail').value.trim();
    var pass   = document.getElementById('regPass').value;
    var err    = document.getElementById('regErr');
    var btn    = document.getElementById('regBtn');
    err.textContent = '';
    if(!name || !school){ err.textContent = 'Введите ФИО и название школы.'; return; }
    if(pass.length < 6){ err.textContent = 'Пароль должен содержать минимум 6 символов.'; return; }
    btn.disabled = true;
    btn.textContent = 'Регистрируем…';
    spRegister(name, school, city, email, pass).then(function(res){
      if(res.ok){
        if(res.confirmRequired){
          var confirmEmail = document.getElementById('confirmEmail');
          if(confirmEmail) confirmEmail.textContent = email;
          document.getElementById('registerForm').style.display = 'none';
          document.getElementById('authTabs').style.display = 'none';
          document.getElementById('confirmPanel').style.display = '';
        } else {
          location.href = '/account.html';
        }
      } else {
        err.textContent = res.error;
        btn.disabled = false;
        btn.textContent = 'Зарегистрироваться';
      }
    }).catch(function(e){
      console.error('[Register error]', e);
      err.textContent = 'Ошибка подключения к серверу. Проверьте интернет или попробуйте позже.';
      btn.disabled = false;
      btn.textContent = 'Зарегистрироваться';
    });
  });
})();
</script>
</body>
</html>
